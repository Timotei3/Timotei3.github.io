  <style>
    .factions-hero{background:#141424;border:1px solid #34345b;border-radius:14px;padding:35px;margin-bottom:25px}
    .factions-hero b{background:#243c9f;color:#8fa8ff;padding:7px 13px;border-radius:6px;font-size:12px;letter-spacing:2px}
    .factions-hero h1{margin-top:18px;font-size:34px;color:#fff}
    .factions-hero p{color:#aaaec7;margin-top:8px}
    .faction-section-title{color:#fff;font-size:26px;margin:25px 0 18px}
    .faction-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:30px}
    .faction-card{background:linear-gradient(135deg,#141720,#101118);border:1px solid #252840;border-radius:16px;padding:24px;min-height:170px;position:relative}
    .faction-card h3{color:#fff;font-size:22px;margin-bottom:30px}
    .faction-icon{position:absolute;top:22px;right:22px;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#232638}
    .members{color:#fff;font-size:13px;font-weight:700;margin-bottom:8px}
    .bar{width:100%;height:6px;background:#2b2d38;border-radius:10px;overflow:hidden;margin-bottom:22px}
    .fill{height:100%;border-radius:10px;width:0%;transition:.4s ease}
    .faction-actions{display:grid;grid-template-columns:1fr;gap:10px}
    .faction-actions button{height:38px;border-radius:7px;border:1px solid #067b54;background:#0d3028;color:#25e39b;font-size:12px;font-weight:800;cursor:pointer}
    .faction-actions button:hover{filter:brightness(1.15)}

    .police .fill{background:#4b7dff}
    .smurd .fill{background:#ff4545}
    .mecanic .fill{background:#4ebed0}
    .illegal .fill{background:#6b6b6b}
    .hitman .fill{background:#7a7158}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:9999}
    .apply-modal{width:540px;max-width:92%;background:#151522;border:1px solid #5b4cb6;border-radius:16px;padding:26px;box-shadow:0 0 35px rgba(177,76,255,.25);position:relative}
    .apply-modal h2{color:white;font-size:26px;margin-bottom:10px}
    .apply-modal p{color:#d8d8f0;margin-bottom:14px}
    .apply-modal input,.apply-modal textarea{width:100%;background:#20222b;color:white;border:1px solid #4c4680;border-radius:10px;padding:13px;margin-bottom:12px;outline:none}
    .apply-modal textarea{min-height:90px;resize:vertical}
    .apply-modal input:focus,.apply-modal textarea:focus{border-color:#b14cff;box-shadow:0 0 12px rgba(177,76,255,.25)}
    .close-modal{position:absolute;right:16px;top:14px;background:#2a2a3a;color:#fff;border:none;padding:6px 12px;border-radius:8px;cursor:pointer}
    .send-application{width:100%;margin-top:8px;background:#8b5cf6;color:#fff;border:none;padding:14px;border-radius:10px;font-weight:800;cursor:pointer}
    #applyStatus{margin-top:14px;color:#d28cff;font-weight:700}

    @media(max-width:1200px){.faction-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:700px){.faction-grid{grid-template-columns:1fr}}
  </style>

];

let currentFaction = "";

function percent(members, max){
  if(!max || max <= 0) return 0;
  return Math.min(100, Math.max(0, (members / max) * 100));
}

function createFactionCard(faction){
  const safeName = faction.name.replaceAll("'", "\\'");
  const width = percent(faction.members, faction.max);

  return `
    <div class="faction-card ${faction.cls}">
      <h3>${faction.name}</h3>
      <div class="faction-icon">${faction.icon}</div>
      <p class="members">${faction.members} / ${faction.max} Membri</p>
      <div class="bar">
        <div class="fill" style="width:${width}%"></div>
      </div>
      <div class="faction-actions">
        <button onclick="openApply('${safeName}')">✈ APLICĂ</button>
      </div>
    </div>
  `;
}

document.getElementById("legalGrid").innerHTML = legalFactions.map(createFactionCard).join("");
document.getElementById("illegalGrid").innerHTML = illegalFactions.map(createFactionCard).join("");

function openApply(faction){
  currentFaction = faction;
  document.getElementById("selectedFaction").innerText = "Facțiune: " + faction;
  document.getElementById("applyModal").style.display = "flex";
  document.getElementById("applyStatus").innerText = "";
}

function closeApply(){
  document.getElementById("applyModal").style.display = "none";
}

async function sendApplication(){
  const webhook = webhooks[currentFaction];
  const status = document.getElementById("applyStatus");

  const name = document.getElementById("appName").value.trim();
  const discord = document.getElementById("appDiscord").value.trim();
  const age = document.getElementById("appAge").value.trim();
  const reason = document.getElementById("appReason").value.trim();
  const experience = document.getElementById("appExperience").value.trim();

  if(!webhook || webhook.includes("PUNE_WEBHOOK")){
    status.innerText = "Webhook-ul pentru această facțiune nu este setat.";
    return;
  }

  if(!name || !discord || !age || !reason || !experience){
    status.innerText = "Completează toate câmpurile.";
    return;
  }

  status.innerText = "Se trimite aplicația...";

  try{
    const response = await fetch(webhook,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        username:"Aplicații Facțiuni",
        embeds:[{
          title:"📩 Aplicație nouă - " + currentFaction,
          color:10181046,
          fields:[
            {name:"Facțiune", value:currentFaction, inline:true},
            {name:"Nume IC", value:name, inline:true},
            {name:"Discord", value:discord, inline:true},
            {name:"Vârstă", value:age, inline:true},
            {name:"Motiv", value:reason},
            {name:"Experiență RP", value:experience}
          ],
          footer:{text:"Sunday Romania Roleplay"}
        }]
      })
    });

    if(!response.ok) throw new Error("Webhook error");

    status.innerText = "Aplicația a fost trimisă!";
    document.getElementById("appName").value = "";
    document.getElementById("appDiscord").value = "";
    document.getElementById("appAge").value = "";
    document.getElementById("appReason").value = "";
    document.getElementById("appExperience").value = "";

    setTimeout(closeApply, 1500);
  }catch(error){
    status.innerText = "Eroare la trimitere. Verifică webhook-ul.";
  }
}
</script>
